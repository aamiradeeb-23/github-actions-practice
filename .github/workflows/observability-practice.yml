name: CI with Observability
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-observe:
    name: Build & Export Metrics
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dummy Build/Test
        run: |
          echo "Simulating application build..."
          sleep 5
          echo "Build successful!"

      - name: Export Workflow Metrics to OTLP
        uses: paper2/github-actions-opentelemetry@main
        if: always()
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}

name: CI with Observability
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-observe:
    name: Build & Export Metrics
    runs-on: ubuntu-latest
    
    # We allow the workflow to write OTel traces
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dummy Build/Test
        run: |
          echo "Simulating application build..."
          sleep 5
          echo "Build successful!"

      - name: Export Workflow Metrics to OTLP
        uses: github-actions-opentelemetry/opentelemetry-github-actions@v1
        if: always() # Ensures the observation runs even if the build fails
        with:
          otelEndpoint: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          otelHeaders: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

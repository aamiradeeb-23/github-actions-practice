name: Production CI with Grafana Observability
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-observe:
    name: Build & Stream Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # A mock build step that represents your application compilation
      - name: Run Core Application Compilation
        id: build_step
        run: |
          echo "Starting application build sequence..."
          echo "Bundling codebase assets..."
          sleep 5
          echo "Build complete!"

      # Sends pipeline execution metrics safely using native node scripting
      - name: Export Telemetry Traces to Grafana Cloud
        if: always()
        env:
          OTEL_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        run: |
          node -e "
          const http = require('https');
          
          // Parse the authentication strings from your headers secret
          const headers = { 'Content-Type': 'application/json' };
          const rawHeaders = process.env.OTEL_HEADERS || '';
          if (rawHeaders.includes('=')) {
            const [key, val] = rawHeaders.split('=');
            headers[key.trim()] = val.trim();
          }

          // Build a standard OTel formatted log packet mapping the job health
          const payload = JSON.stringify({
            resourceLogs: [{
              resource: { attributes: [{ key: 'service.name', value: { stringValue: 'github-actions-pipeline' } }] },
              scopeLogs: [{
                logRecords: [{
                  timeUnixNano: (Date.now() * 1000000).toString(),
                  severityText: '${{ job.status }}' === 'success' ? 'INFO' : 'ERROR',
                  body: { stringValue: 'Pipeline completed execution run.' },
                  attributes: [
                    { key: 'github.repository', value: { stringValue: '${{ github.repository }}' } },
                    { key: 'github.workflow', value: { stringValue: '${{ github.workflow }}' } },
                    { key: 'github.run_id', value: { stringValue: '${{ github.run_id }}' } },
                    { key: 'pipeline.status', value: { stringValue: '${{ job.status }}' } }
                  ]
                }]
              }]
            }]
          });

          // Post the data cleanly over standard HTTPS hooks to Grafana Labs
          const url = process.env.OTEL_ENDPOINT + '/v1/logs';
          const req = http.request(url, { method: 'POST', headers }, (res) => {
            console.log('Telemetry Response Status:', res.statusCode);
            process.exit(res.statusCode >= 200 && res.statusCode < 300 ? 0 : 1);
          });

          req.on('error', (e) => { console.error(e); process.exit(1); });
          req.write(payload);
          req.end();
          "

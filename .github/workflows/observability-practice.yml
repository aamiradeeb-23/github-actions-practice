name: CI with Observability
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-observe:
    name: Build & Export Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup the official OpenTelemetry CLI tool
      - name: Install OTel CLI
        run: |
          curl -sSLo otel-cli https://github.com
          chmod +x otel-cli
          sudo mv otel-cli /usr/local/bin/

      # 2. Run your application build and trace its execution manually
      - name: Run Build and Trace Step
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        run: |
          echo "Starting observable build..."
          
          # This command executes the code and sends a precise duration span to Grafana Cloud
          otel-cli exec \
            --service github-actions-ci \
            --name "Simulated Build & Test Step" \
            -- \
            sh -c "echo 'Compiling application assets...'; sleep 5; echo 'Build successful!'"

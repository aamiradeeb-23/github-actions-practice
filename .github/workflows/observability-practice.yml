name: Production CI with Grafana Observability
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-observe:
    name: Build & Stream Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Official OpenTelemetry maintained step to initialize instrumentation
      - name: Setup OpenTelemetry Ingestion
        uses: open-telemetry/opentelemetry-collector-github-actions@v0.2.0
        with:
          otel_endpoint: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          otel_headers: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      # Your pipeline steps now automatically stream metrics directly to Grafana Cloud
      - name: Run Core Application Compilation
        run: |
          echo "Starting application build sequence..."
          echo "Bundling codebase..."
          sleep 5
          echo "Build complete!"

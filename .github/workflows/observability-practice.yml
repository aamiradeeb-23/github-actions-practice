name: CI with Observability
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-observe:
    name: Build & Export Metrics
    runs-on: ubuntu-latest

    steps:
      # 1. Initialize the OpenTelemetry Trace Collector Wrapper
      - name: OpenTelemetry Trace Initialization
        uses: honeycombio/gha-otel-trace@v1
        with:
          endpoint: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          headers: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Execute pipeline workload steps cleanly
      - name: Run Dummy Build/Test
        run: |
          echo "Simulating application build..."
          sleep 5
          echo "Build successful!"

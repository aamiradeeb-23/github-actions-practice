name: Production CI with Grafana Observability
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-observe:
    name: Build & Stream Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Run Core Application Compilation
        id: build_step
        run: |
          echo "Starting application build sequence..."
          echo "Bundling codebase assets..."
          sleep 5
          echo "Build complete!"

      - name: Export Telemetry Logs to Grafana Cloud
        if: always()
        env:
          OTEL_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        run: |
          # 1. Standardize and construct the correct OTLP logs URL path
          BASE_URL=$(echo "$OTEL_ENDPOINT" | sed 's/\/$//')
          if [[ "$BASE_URL" != */v1/logs ]]; then
            FINAL_URL="$BASE_URL/v1/logs"
          else
            FINAL_URL="$BASE_URL"
          fi
          
          echo "Streaming metrics to: $FINAL_URL"

          # 2. Build the payload matching the official OpenTelemetry schema
          PAYLOAD=$(cat <<EOF
          {
            "resourceLogs": [{
              "resource": { "attributes": [{ "key": "service.name", "value": { "stringValue": "github-actions-pipeline" } }] },
              "scopeLogs": [{
                "logRecords": [{
                  "timeUnixNano": "$(date +%s%N)",
                  "severityText": "${{ job.status }}" == "success" ? "INFO" : "ERROR",
                  "body": { "stringValue": "Pipeline execution completed." },
                  "attributes": [
                    { "key": "github.repository", "value": { "stringValue": "${{ github.repository }}" } },
                    { "key": "github.workflow", "value": { "stringValue": "${{ github.workflow }}" } },
                    { "key": "github.run_id", "value": { "stringValue": "${{ github.run_id }}" } },
                    { "key": "pipeline.status", "value": { "stringValue": "${{ job.status }}" } }
                  ]
                }]
              }]
            }]
          }
          EOF
          )

          # 3. Securely transmit via curl, utilizing -L to follow redirects automatically
          HEADER_KEY=$(echo "$OTEL_HEADERS" | cut -d'=' -f1)
          HEADER_VAL=$(echo "$OTEL_HEADERS" | cut -d'=' -f2-)

          curl -L -X POST "$FINAL_URL" \
            -H "Content-Type: application/json" \
            -H "$HEADER_KEY: $HEADER_VAL" \
            -d "$PAYLOAD" \
            --fail

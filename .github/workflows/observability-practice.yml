name: CI with Observability
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-observe:
    name: Build & Export Metrics
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dummy Build/Test
        run: |
          echo "Simulating application build..."
          sleep 5
          echo "Build successful!"

      - name: Export Workflow Metrics to OTLP
        uses: open-telemetry/opentelemetry-collector-github-actions@v0.1.0
        if: always()
        with:
          otel_endpoint: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          otel_headers: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
